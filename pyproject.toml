[build-system]
requires = ["setuptools>=40.8.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "auraPL"
version = "0.0.2.3"
description = "A Programming Language called auraPL"
requires-python = ">=3.9"
license = "MIT"

[tool.setuptools.packages.find]
where = ["."]
exclude = ["run*"]